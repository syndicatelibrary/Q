<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personified.</title>
<link id="favicon" rel="icon" href="favicon.png" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700&display=swap">
<style>
:root{
  --bg:#0b0c0e;--bg2:#111214;--bg3:#18191d;--bg4:#1e2026;
  --border:#2a2c33;--border2:#333640;
  --text:#d4d6de;--text2:#8a8d99;--text3:#555866;
  --accent:#4f9eff;--accent2:#3a7dd4;
  --green:#4ec994;--red:#ff5f6d;--yellow:#f0c040;--purple:#a78bfa;
  --mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
  --sidebar:230px;--topbar:40px;--tabbar:34px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* TOP BAR */
#topbar{height:var(--topbar);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:5px;flex-shrink:0;z-index:100;overflow-x:auto}
#topbar::-webkit-scrollbar{height:0}
.logo{font-family:var(--sans);font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.5px;margin-right:5px;white-space:nowrap;flex-shrink:0}
.sep{width:1px;height:18px;background:var(--border);margin:0 2px;flex-shrink:0}

.tb{height:26px;padding:0 9px;border:1px solid var(--border2);border-radius:5px;background:var(--bg3);color:var(--text);font-family:var(--mono);font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:background .15s,border-color .15s,color .15s;flex-shrink:0}
.tb:hover{background:var(--bg4);border-color:var(--border2);color:#fff}
.tb.on{background:var(--bg4);border-color:var(--border2);color:#fff;font-weight:600}
.tb.on:hover{background:var(--bg4)}

.tb.g{border-color:rgba(78,201,148,.4);color:var(--green)}.tb.g:hover{background:rgba(78,201,148,.15);color:var(--green)}
.tb.y{border-color:rgba(240,192,64,.4);color:var(--yellow)}.tb.y:hover{background:rgba(240,192,64,.15);color:var(--yellow)}
.tb.r{border-color:rgba(255,95,109,.4);color:var(--red)}.tb.r:hover{background:rgba(255,95,109,.15);color:var(--red)}

.spacer{flex:1;min-width:8px}
.fname{font-size:11px;color:var(--text2);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}

/* LAYOUT */
#layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
#sb-head{padding:7px 10px 3px;font-size:10px;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.sh-actions{display:flex;gap:8px}
.sh-btn{cursor:pointer;color:var(--text3);font-size:11px;transition:color .15s}.sh-btn:hover{color:var(--accent)}

/* Sidebar tabs */
#sb-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 4px;gap:1px;flex-shrink:0}
.stab{padding:5px 6px;font-size:10px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;display:flex;align-items:center;gap:3px}
.stab:hover{color:var(--text)}.stab.active{color:var(--accent);border-bottom-color:var(--accent)}
.stab-ct{background:var(--bg4);border-radius:8px;padding:0 4px;font-size:9px;color:var(--text3)}

/* File list */
#file-list{flex:1;overflow-y:auto;padding:3px 0}
#file-list::-webkit-scrollbar{width:3px}
#file-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.fl-label{padding:5px 10px 2px;font-size:9px;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;user-select:none}

.fi{display:flex;align-items:center;padding:4px 8px;cursor:pointer;gap:6px;transition:background .12s;border-left:2px solid transparent;user-select:none}
.fi:hover{background:var(--bg3)}.fi.active{background:var(--bg4);border-left-color:var(--accent)}
.fi.fav{border-left-color:var(--yellow)}.fi.fav.active{border-left-color:var(--accent)}

/* icon cell */
.fi-ico{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:3px;overflow:hidden}
.fi-ico img{width:100%;height:100%;object-fit:cover;border-radius:2px}
.fi-ico i{font-size:14px;line-height:1}
.fi-nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--text)}
.fi-badge{font-size:9px;color:var(--text3);background:var(--bg4);border-radius:3px;padding:1px 4px;flex-shrink:0}
.fi-acts{display:flex;gap:2px;opacity:0;transition:opacity .15s;flex-shrink:0}
.fi:hover .fi-acts{opacity:1}
.fia{width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3);cursor:pointer;transition:background .12s,color .12s}
.fia:hover{background:var(--bg4);color:var(--text)}
.fia.star.on{color:var(--yellow)}
.fia.del:hover{background:rgba(255,95,109,.15);color:var(--red)}

.sb-empty{padding:20px 10px;font-size:11px;color:var(--text3);text-align:center;line-height:1.7}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* TAB BAR */
#tabbar{height:var(--tabbar);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;overflow-x:auto;overflow-y:hidden;flex-shrink:0}
#tabbar::-webkit-scrollbar{height:2px}
#tabbar::-webkit-scrollbar-thumb{background:var(--border2)}
.tab{display:flex;align-items:center;padding:0 10px 0 9px;height:30px;gap:5px;cursor:pointer;border-right:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:11px;white-space:nowrap;transition:background .12s,color .12s;position:relative;flex-shrink:0}
.tab:hover{background:var(--bg3);color:var(--text)}.tab.active{background:var(--bg);color:var(--text)}
.tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent)}
.t-ico{font-size:12px;width:14px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.t-ico i{font-size:12px;line-height:1}
.t-nm{max-width:110px;overflow:hidden;text-overflow:ellipsis}
.t-dup{font-size:9px;color:var(--text3);background:var(--bg4);border-radius:3px;padding:1px 3px;flex-shrink:0}
.t-x{width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3);transition:background .12s,color .12s;flex-shrink:0}
.t-x:hover{background:var(--red);color:#fff}
.tab.mod .t-nm::after{content:'·';color:var(--yellow);margin-left:2px}

/* EDITOR AREA */
#editor-area{flex:1;display:flex;overflow:hidden}
#editor-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Line nums + textarea */
#ed-cont{flex:1;display:flex;overflow:hidden}
#line-nums{width:46px;background:var(--bg);color:var(--text3);font-family:var(--mono);font-size:13px;line-height:1.65;padding:16px 6px 16px 0;text-align:right;overflow:hidden;flex-shrink:0;user-select:none;border-right:1px solid var(--border);white-space:pre}
#editor{flex:1;background:var(--bg);color:var(--text);border:none;outline:none;resize:none;font-family:var(--mono);font-size:13px;line-height:1.65;padding:16px 20px;tab-size:2;overflow:auto}

/* NO FILE */
#no-file{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:10px}
#no-file .big{font-size:32px}

/* NOTES PANEL */
#notes-panel{width:0;border-left:0px solid var(--border);background:var(--bg);overflow:hidden;flex-shrink:0;display:flex;flex-direction:column;transition:width .2s,border-left-width .2s}
#notes-panel.on{width:250px;border-left-width:1px}
#notes-tb{height:28px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0}
#notes-tb span{font-size:11px;color:var(--text2);flex:1}
.panel-x{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 4px}.panel-x:hover{color:var(--red)}
#notes-ed{flex:1;background:transparent;color:var(--text);border:none;outline:none;resize:none;font-family:var(--mono);font-size:12px;line-height:1.7;padding:12px;overflow:auto}

/* PREVIEW PANEL */
#preview-panel{width:0;border-left:0px solid var(--border);background:#fff;flex-shrink:0;display:flex;flex-direction:column;transition:width .2s,border-left-width .2s;overflow:hidden}
#preview-panel.on{width:50%;border-left-width:1px}
#prev-tb{height:28px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0}
#prev-tb .pt{font-size:11px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#prev-newwin{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 5px}.prev-newwin:hover{color:var(--accent)}
#preview-frame{flex:1;border:none;width:100%}

/* TERMINAL */
#terminal{height:0;border-top:0px solid var(--border);background:var(--bg);overflow:hidden;flex-shrink:0;display:flex;flex-direction:column;transition:height .3s,border-top-width .3s}
#terminal.on{height:220px;border-top-width:1px}
#terminal.expanded{height:60vh;border-top-width:1px}
#term-tb{height:26px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0}
#term-tb .tt{font-size:10px;color:var(--text3);flex:1}
#term-clr{font-size:10px;color:var(--text3);cursor:pointer;padding:2px 5px;border-radius:3px;transition:color .15s}
#term-clr:hover{color:var(--text)}
#term-expand{font-size:10px;color:var(--text3);cursor:pointer;padding:2px 5px;border-radius:3px;transition:color .15s}
#term-expand:hover{color:var(--accent)}
#term-out{flex:1;overflow-y:auto;padding:6px 12px 2px;font-size:12px;line-height:1.65;font-family:var(--mono);min-height:0}
#term-out::-webkit-scrollbar{width:3px}
#term-out::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.tl{color:var(--text)}.tl.info{color:var(--accent)}.tl.warn{color:var(--yellow)}.tl.err{color:var(--red)}.tl.ok{color:var(--green)}.tl.raw{color:var(--text2);white-space:pre}
.tl .ts{color:var(--text3);font-size:10px;margin-right:6px}
.tl.cmd{color:var(--green)}
.tl.cmd .tl-dollar{color:var(--green);margin-right:6px;opacity:.65}
#term-input-row{display:flex;align-items:center;padding:3px 12px 5px;flex-shrink:0;background:var(--bg);border-top:1px solid var(--border);cursor:text;position:relative;min-height:28px}
#term-prompt{color:var(--green);font-size:12px;font-family:var(--mono);flex-shrink:0;user-select:none;margin-right:6px;white-space:nowrap;z-index:1;pointer-events:none}
#term-input{position:absolute;inset:0;opacity:0;cursor:text;font-size:12px;font-family:var(--mono);border:none;outline:none;background:transparent;padding:3px 12px;padding-left:0}
#term-display{flex:1;font-size:12px;font-family:var(--mono);color:var(--text);white-space:pre;line-height:1.65;position:relative;z-index:1;pointer-events:none;min-height:1.65em}
#term-cursor{display:inline-block;width:.58em;height:1em;background:transparent;vertical-align:text-bottom;position:relative;top:1px}
#term-input-row.focused #term-cursor{background:#fff;animation:bash-blink .9s step-end infinite}
@keyframes bash-blink{0%,100%{background:#fff}50%{background:transparent}}

/* MEDIA VIEWER */
#media-viewer{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);overflow:auto;position:relative}
#media-viewer.on{display:flex}
#img-wrap{display:none;flex-direction:column;align-items:center;gap:10px;max-width:90%;max-height:90%;position:relative}
#img-wrap img{max-width:100%;max-height:calc(100vh - 220px);object-fit:contain;border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,.6);display:block}
#img-dims{font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:3px 10px;align-self:flex-end}
#aud-wrap{display:none;flex-direction:column;align-items:center;gap:18px;width:340px;padding:20px 0}
#aud-art{width:200px;height:200px;border-radius:14px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 10px 48px rgba(0,0,0,.6);flex-shrink:0}
#aud-art img{width:100%;height:100%;object-fit:cover;border-radius:14px}
#aud-art i{font-size:52px;color:var(--text3)}
#aud-title{font-family:var(--sans);font-size:15px;font-weight:600;text-align:center;max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
#aud-ctrl{display:flex;flex-direction:column;gap:12px;width:100%}
#aud-prog-row{display:flex;align-items:center;gap:8px;width:100%}
#aud-cur,#aud-tot{font-size:11px;color:var(--text2);width:36px;flex-shrink:0;font-family:var(--mono)}
#aud-tot{text-align:right}
#aud-prog{flex:1;height:4px;background:var(--bg4);border-radius:2px;cursor:pointer;border:none;outline:none;appearance:none;-webkit-appearance:none}
#aud-prog::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;margin-top:-5px}
#aud-prog::-webkit-slider-runnable-track{height:4px;border-radius:2px;background:linear-gradient(to right,var(--accent) var(--p,0%),var(--bg4) var(--p,0%))}
#aud-btns{display:flex;align-items:center;justify-content:center;gap:12px}
.abtn{background:var(--bg3);border:1px solid var(--border2);border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:14px;transition:background .15s,border-color .15s,color .15s}
.abtn:hover{background:var(--bg4);border-color:var(--accent);color:var(--accent)}
.abtn.play{width:52px;height:52px;background:var(--accent);border-color:var(--accent);color:#000;font-size:18px}
.abtn.play:hover{background:var(--accent2)}
#aud-vol{display:flex;align-items:center;gap:8px;justify-content:center}
#aud-vol-ico{font-size:13px;color:var(--text2);cursor:pointer;width:18px;text-align:center}
#aud-vol-r{width:90px;height:3px;appearance:none;-webkit-appearance:none;background:var(--bg4);border-radius:2px;outline:none;cursor:pointer;border:none}
#aud-vol-r::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--text2);cursor:pointer}

.fia.exp:hover{background:rgba(79,158,255,.15);color:var(--accent)}

/* FOLDER ROWS */
.fo{display:flex;align-items:center;padding:3px 6px;cursor:pointer;gap:4px;transition:background .12s;user-select:none;border-left:2px solid transparent;position:relative}
.fo:hover{background:var(--bg3)}.fo.drag-over{background:rgba(79,158,255,.1);border-left-color:var(--accent)}
.fo-indent{flex-shrink:0}
.fo-arrow{font-size:9px;color:var(--text3);width:12px;flex-shrink:0;display:inline-block;transition:transform .15s;text-align:center}
.fo-arrow.open{transform:rotate(90deg)}
.fo-ico{font-size:12px;color:var(--yellow);flex-shrink:0;width:16px;text-align:center}
.fo-nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--text2)}
.fo-acts{display:flex;gap:2px;opacity:0;transition:opacity .15s;flex-shrink:0}
.fo:hover .fo-acts{opacity:1}
.fi[draggable="true"]{cursor:grab}
.fi.drag-over{background:rgba(79,158,255,.1);border-left-color:var(--accent)}

/* MOVE MODAL */
#move-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1002;align-items:center;justify-content:center}
#move-ov.on{display:flex}
#move-box{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:16px 20px;min-width:260px;max-width:90vw;display:flex;flex-direction:column;gap:10px}
#move-box h3{font-family:var(--sans);font-size:13px;color:var(--text)}
#move-list{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.move-opt{padding:7px 10px;border-radius:5px;cursor:pointer;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:7px;transition:background .12s}
.move-opt:hover{background:var(--bg4);color:var(--text)}

/* FOLDER CTX */
#ctx-fo{display:none;position:fixed;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:4px 0;z-index:9000;min-width:162px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
#ctx-fo.on{display:block}

/* CONTEXT MENU */
#ctx{display:none;position:fixed;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:4px 0;z-index:9000;min-width:162px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
#ctx.on{display:block}
.ci{padding:6px 14px;font-size:12px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.ci:hover{background:var(--bg4)}.ci i{width:14px;text-align:center;color:var(--text3);font-size:11px}
.ci.danger{color:var(--red)}.ci.danger i{color:var(--red)}
.csep{height:1px;background:var(--border);margin:3px 0}

/* MODAL */
#modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center}
#modal-ov.on{display:flex}
#modal{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:18px 22px;min-width:300px;max-width:90vw;display:flex;flex-direction:column;gap:12px}
#modal h3{font-family:var(--sans);font-size:13px;color:var(--text)}
#modal input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:7px 10px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none}
#modal input:focus{border-color:var(--accent)}
.mb{display:flex;gap:7px;justify-content:flex-end}

/* DROP */
#drop-ov{display:none;position:fixed;inset:0;background:rgba(79,158,255,.06);border:2px dashed var(--accent);z-index:2000;align-items:center;justify-content:center;font-family:var(--sans);font-size:18px;font-weight:700;color:var(--accent);pointer-events:none}
#drop-ov.on{display:flex}

::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
[class^="devicon-"],[class*=" devicon-"]{line-height:1}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div style="margin-left:-15px;" class="logo"></div>
  <button class="tb" onclick="openAddFileModal()"><i class="fa fa-plus"></i> New</button>
  <button class="tb" onclick="openNewFolderModal()"><i class="fa fa-folder-plus"></i> Folder</button>
  <button class="tb" onclick="triggerUpload()"><i class="fa fa-folder-open"></i> Open</button>
  <div class="sep"></div>
  <button class="tb" onclick="importZip()"><i class="fa fa-file-zipper"></i> Import</button>
  <button class="tb" onclick="exportZip()"><i class="fa fa-file-export"></i> Export</button>
  <input type="file" id="file-input" multiple style="display:none" onchange="handleUpload(event)">
  <input type="file" id="zip-input" accept=".zip" style="display:none" onchange="handleZipImport(event)">
  <div class="sep"></div>
  <button class="tb g" id="btn-prev" onclick="togglePreview()"><i class="fa fa-eye"></i> Preview</button>
  <button class="tb y" onclick="openNewWindow()" title="Open HTML in new window"><i class="fa fa-arrow-up-right-from-square"></i> Window</button>
  <button class="tb" id="btn-run" onclick="runFile()"><i class="fa fa-gear"></i> Run</button>
  <button class="tb" id="btn-notes" onclick="toggleNotes()"><i class="fa fa-note-sticky"></i> Notes</button>
  <button class="tb" id="btn-term" onclick="toggleTerminal()"><i class="fa fa-terminal"></i> Terminal</button>
  <div class="spacer"></div>
  <div class="fname" id="fname-display">no file open</div>
</div>

<!-- LAYOUT -->
<div id="layout">
  <div id="sidebar">
    <div id="sb-head">
      <span>Explorer</span>
      <div class="sh-actions">
        <span class="sh-btn" onclick="openAddFileModal()" title="New file"><i class="fa fa-plus"></i></span>
        <span class="sh-btn" onclick="openNewFolderModal()" title="New folder"><i class="fa fa-folder-plus"></i></span>

<script>
// ═══════════════════════════════════════════════════════════
// UID
// ═══════════════════════════════════════════════════════════
let _uid = 0;
const uid = () => 'f' + (++_uid);

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const S = {
  files:        {},
  folders:      {},   // path → { path, collapsed }
  openTabs:     [],
  activeId:     null,
  lastHtmlId:   null,
  favorites:    [],
  modified:     new Set(),
  sidebarTab:   'all',
  previewOn:    false,
  notesOn:      false,
  termOn:       false,
  ctxId:        null,
  ctxFolder:    null,
  modalMode:    null,
  modalFolder:  null,   // target folder for new-file modal
  cwd:          '',     // current working dir for terminal
  termExpanded: false,
  audio: { playing: false }
};

// ═══════════════════════════════════════════════════════════
// FOLDER MANAGEMENT
// ═══════════════════════════════════════════════════════════
function ensureFolders(filePath) {
  const parts = filePath.split('/');
  for (let i = 1; i < parts.length; i++) {
    const p = parts.slice(0, i).join('/');
    if (!S.folders[p]) S.folders[p] = { path: p, collapsed: false };
  }
}

function addFolder(folderPath) {
  if (!folderPath) return;
  const parts = folderPath.split('/');
  for (let i = 1; i <= parts.length; i++) {
    const p = parts.slice(0, i).join('/');
    if (!S.folders[p]) S.folders[p] = { path: p, collapsed: false };
  }
  renderAll();
  tlog('Created: ' + folderPath + '/', 'ok');
}

function deleteFolder(folderPath) {
  const pre = folderPath + '/';
  // delete child files
  Object.keys(S.files).forEach(id => {
    const p = S.files[id].path;
    if (p === folderPath || p.startsWith(pre)) deleteFile(id, true);
  });
  // delete folder records (this and all children)
  Object.keys(S.folders).forEach(p => {
    if (p === folderPath || p.startsWith(pre)) delete S.folders[p];
  });
  renderAll();
}

function renameFolder(oldPath, newName) {
  newName = newName.trim();
  if (!newName) return;
  const parts = oldPath.split('/');
  parts[parts.length - 1] = newName;
  const newPath = parts.join('/');
  if (newPath === oldPath) return;
  const pre = oldPath + '/';
  // move files
  Object.values(S.files).forEach(f => {
    if (f.path.startsWith(pre)) f.path = newPath + '/' + f.path.slice(pre.length);
    else if (f.path === oldPath) f.path = newPath;
  });
  // move folder records
  const toAdd = {};
  Object.keys(S.folders).forEach(p => {
    if (p === oldPath || p.startsWith(pre)) {
      const np = newPath + p.slice(oldPath.length);
      toAdd[np] = { path: np, collapsed: S.folders[p].collapsed };
      delete S.folders[p];
    }
  });
  Object.assign(S.folders, toAdd);
  renderAll(); renderTabBar();
}

function moveFileToFolder(id, targetFolder) {
  const f = S.files[id]; if (!f) return;
  const newPath = targetFolder ? targetFolder + '/' + f.name : f.name;
  f.path = newPath;
  ensureFolders(newPath);
  renderAll(); renderTabBar();
  tlog('Moved ' + f.name + ' → ' + (targetFolder || '/'), 'ok');
}

function openMoveModal(fileId) {
  S.ctxId = fileId;
  const list = document.getElementById('move-list');
  let html = '<div class="move-opt" onclick="moveFileToFolder(\'' + fileId + '\',\'\');closeMoveModal()"><i class="fa fa-folder-open" style="color:var(--text3)"></i> / (root)</div>';
  const folders = Object.keys(S.folders).sort();
  const f = S.files[fileId];
  const curFolder = f ? f.path.includes('/') ? f.path.split('/').slice(0,-1).join('/') : '' : '';
  folders.forEach(fp => {
    if (fp === curFolder) return;
    const depth = fp.split('/').length - 1;
    const indent = '&nbsp;'.repeat(depth * 3);
    const name = fp.split('/').pop();
    html += '<div class="move-opt" onclick="moveFileToFolder(\''+fileId+'\',\''+fp+'\');closeMoveModal()">' + indent + '<i class="fa fa-folder" style="color:var(--yellow)"></i> ' + escH(name) + '</div>';
  });
  list.innerHTML = html;
  document.getElementById('move-ov').classList.add('on');
}
function closeMoveModal() { document.getElementById('move-ov').classList.remove('on'); }

function openNewFolderModal(parentFolder) {
  S.modalMode = 'newfolder';
  S.modalFolder = parentFolder || S.cwd || '';
  document.getElementById('modal-title').textContent = 'New Folder';
  document.getElementById('modal-inp').value = '';
  document.getElementById('modal-inp').placeholder = 'folder-name';
  document.getElementById('modal-ov').classList.add('on');
  setTimeout(() => document.getElementById('modal-inp').focus(), 50);
}

function showFolderCtx(e, folderPath) {
  e.preventDefault(); e.stopPropagation();
  S.ctxFolder = folderPath;
  document.getElementById('ctx').classList.remove('on');
  const m = document.getElementById('ctx-fo');
  m.style.left = Math.min(e.clientX, window.innerWidth - 175) + 'px';
  m.style.top  = Math.min(e.clientY, window.innerHeight - 120) + 'px';
  m.classList.add('on');
}

// ═══════════════════════════════════════════════════════════
// FILE TYPE HELPERS
// ═══════════════════════════════════════════════════════════
const TEXT_EXTS  = new Set(['html','htm','js','jsx','ts','tsx','css','scss','sass','less','json','md','txt','xml','svg','csv','yaml','yml','sh','py','rb','php','c','cpp','h','rs','go','java','kt','swift','vue','toml','ini','env','graphql','sql']);
const IMAGE_EXTS = new Set(['png','jpg','jpeg','gif','webp','bmp','ico','avif','tiff']);
const AUDIO_EXTS = new Set(['mp3','wav','ogg','flac','aac','m4a','opus','weba']);

const ext  = n => (n.split('.').pop()||'').toLowerCase();
const isT  = n => TEXT_EXTS.has(ext(n));
const isI  = n => IMAGE_EXTS.has(ext(n));
const isA  = n => AUDIO_EXTS.has(ext(n));
const isH  = n => ['html','htm'].includes(ext(n));
const ftyp = n => isI(n)?'image':isA(n)?'audio':'text';

function typeRank(name) {
  const e = ext(name);
  if (['html','htm'].includes(e)) return 0;
  if (['js','jsx','ts','tsx'].includes(e)) return 1;
  if (['css','scss','sass','less'].includes(e)) return 2;
  if (e==='json') return 3;
  if (e==='md') return 4;
  return 5;
}

function sortedIds(filter) {
  const all = Object.keys(S.files).filter(id => filter ? filter(S.files[id]) : true);
  const favSet = new Set(S.favorites);
  const favs = S.favorites.filter(id => all.includes(id));
  const rest = all.filter(id => !favSet.has(id)).sort((a,b) => {
    const ra = typeRank(S.files[a].name), rb = typeRank(S.files[b].name);
    if (ra!==rb) return ra-rb;
    return S.files[a].name.localeCompare(S.files[b].name);
  });
  return [...favs, ...rest];
}

// ═══════════════════════════════════════════════════════════
// MIME HELPERS
// ═══════════════════════════════════════════════════════════
function mimeForName(name) {
  const e = ext(name);
  const m = {
    html:'text/html', htm:'text/html',
    css:'text/css', scss:'text/css', sass:'text/css', less:'text/css',
    js:'application/javascript', jsx:'application/javascript',
    ts:'application/javascript', tsx:'application/javascript',
    json:'application/json', svg:'image/svg+xml',
    xml:'application/xml', txt:'text/plain', md:'text/plain',
    // images — all of them
    png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg',
    gif:'image/gif', webp:'image/webp', bmp:'image/bmp',
    ico:'image/x-icon', avif:'image/avif', tiff:'image/tiff',
    // audio
    mp3:'audio/mpeg', wav:'audio/wav', ogg:'audio/ogg',
    flac:'audio/flac', aac:'audio/aac', m4a:'audio/mp4',
    opus:'audio/ogg', weba:'audio/webm',
  };
  return m[e] || 'application/octet-stream';
}

// FIX: Ensure a dataUrl has the correct MIME for the given filename.
// Handles bad MIMEs from JSZip (octet-stream, empty, or totally wrong).
function fixDataUrlMime(dataUrl, name) {
  if (!dataUrl) return dataUrl;
  const correctMime = mimeForName(name);
  // Extract current MIME from header
  const headerEnd = dataUrl.indexOf(',');
  if (headerEnd === -1) return dataUrl;
  const header = dataUrl.substring(0, headerEnd); // e.g. "data:image/gif;base64"
  const mimeMatch = header.match(/^data:([^;,]+)/);
  const currentMime = mimeMatch ? mimeMatch[1] : '';
  // Replace if wrong: octet-stream, empty, or mismatched for known types
  const needsFix = !currentMime ||
    currentMime === 'application/octet-stream' ||
    (isI(name) && !currentMime.startsWith('image/')) ||
    (isA(name) && !currentMime.startsWith('audio/'));
  if (needsFix) {
    const b64 = dataUrl.substring(headerEnd + 1);
    // If the header says ";base64" keep that encoding marker
    const encoding = header.includes(';base64') ? ';base64' : '';
    return 'data:' + correctMime + encoding + ',' + b64;
  }
  return dataUrl;
}

// Convert Blob → base64 data URL with correct MIME
function blobToDataUrl(blob, name) {
  return new Promise((resolve) => {
    const correctMime = mimeForName(name);
    // Retype blob if needed — some blobs from JSZip come with wrong/empty type
    const typed = (blob.type && blob.type !== '' && blob.type !== 'application/octet-stream')
      ? blob : new Blob([blob], { type: correctMime });
    const r = new FileReader();
    r.onload  = () => resolve(r.result);
    r.onerror = () => resolve(null);
    r.readAsDataURL(typed);
  });
}

// FIX: Get a reliable, correctly-typed data URL for any file asset.
// Prioritises stored dataUrl but always validates + fixes its MIME.
// Falls back to re-reading from blob when dataUrl is missing or corrupted.
async function assetDataUrl(f) {
  // If we have a stored dataUrl, fix its MIME and return it
  if (f.dataUrl) {
    const fixed = fixDataUrlMime(f.dataUrl, f.name);
    // Persist the fix so subsequent calls are instant
    if (fixed !== f.dataUrl) f.dataUrl = fixed;
    return f.dataUrl;
  }
  // Fallback: convert raw blob (async, but guaranteed correct)
  if (f.blob) {
    const du = await blobToDataUrl(f.blob, f.name);
    if (du) f.dataUrl = du; // cache for future calls
    return f.dataUrl || null;
  }
  return null;
}

// Shorthand async blob→dataUrl used in zip import
const b2du = (blob, name) => blobToDataUrl(blob, name || '');

// ═══════════════════════════════════════════════════════════
// ICONS
// ═══════════════════════════════════════════════════════════
function iconInner(f, forTab=false) {
  if (!forTab) {
    if (f.type==='image' && f.dataUrl) return `<img src="${f.dataUrl}" alt="">`;
    if (f.type==='audio') {
      if (f.thumbUrl) return `<img src="${f.thumbUrl}" alt="">`;
      return `<i class="fa fa-music" style="color:var(--purple)"></i>`;
    }
  } else {
    if (f.type==='image') return `<i class="fa fa-image" style="color:var(--accent)"></i>`;
    if (f.type==='audio') return `<i class="fa fa-music" style="color:var(--purple)"></i>`;
  }
  const e = ext(f.name);
  const map = {
    html:'<i class="devicon-html5-plain" style="color:#e34c26"></i>',
    htm:'<i class="devicon-html5-plain" style="color:#e34c26"></i>',
    css:'<i class="devicon-css3-plain" style="color:#264de4"></i>',
    scss:'<i class="devicon-sass-original" style="color:#cd6799"></i>',
    sass:'<i class="devicon-sass-original" style="color:#cd6799"></i>',
    less:'<i class="fa fa-leaf" style="color:#1d365d"></i>',
    js:'<i class="devicon-javascript-plain" style="color:#f7df1e"></i>',
    jsx:'<i class="devicon-react-original" style="color:#61dafb"></i>',
    ts:'<i class="devicon-typescript-plain" style="color:#3178c6"></i>',
    tsx:'<i class="devicon-react-original" style="color:#3178c6"></i>',
    vue:'<i class="devicon-vuejs-plain" style="color:#42b883"></i>',
    py:'<i class="devicon-python-plain" style="color:#3776ab"></i>',
    json:'<i class="devicon-json-plain" style="color:#cbcb41"></i>',
    md:'<i class="devicon-markdown-original" style="color:#888"></i>',
    svg:'<i class="fa fa-bezier-curve" style="color:#ffb13b"></i>',
    xml:'<i class="fa fa-code" style="color:#f4a261"></i>',
    sh:'<i class="fa fa-terminal" style="color:var(--green)"></i>',
    rb:'<i class="devicon-ruby-plain" style="color:#cc342d"></i>',
    php:'<i class="devicon-php-plain" style="color:#777bb3"></i>',
    go:'<i class="devicon-go-plain" style="color:#00add8"></i>',
    rs:'<i class="devicon-rust-plain" style="color:#dea584"></i>',
    java:'<i class="devicon-java-plain" style="color:#f89820"></i>',
    c:'<i class="devicon-c-plain" style="color:#a8b9cc"></i>',
    h:'<i class="devicon-c-plain" style="color:#a8b9cc"></i>',
    cpp:'<i class="devicon-cplusplus-plain" style="color:#659bd3"></i>',
    kt:'<i class="devicon-kotlin-plain" style="color:#7f52ff"></i>',
    swift:'<i class="devicon-swift-plain" style="color:#f05138"></i>',
    txt:'<i class="fa fa-file-lines" style="color:var(--text3)"></i>',
    csv:'<i class="fa fa-table" style="color:var(--green)"></i>',
    sql:'<i class="fa fa-database" style="color:var(--accent)"></i>',
    graphql:'<i class="fa fa-diagram-project" style="color:#e535ab"></i>',
    env:'<i class="fa fa-lock" style="color:var(--yellow)"></i>',
  };
  return map[e] || `<i class="fa fa-file" style="color:var(--text3)"></i>`;
}

// ═══════════════════════════════════════════════════════════
// FILE MANAGEMENT
// ═══════════════════════════════════════════════════════════
function addFile(opts) {
  const id = uid();
  const name = opts.name;
  const path = opts.path || name;
  const type = opts.type || ftyp(name);
  S.files[id] = { id, name, path, content: opts.content||'', type, dataUrl: opts.dataUrl||null, blob: opts.blob||null, thumbUrl: null };
  // Fix MIME on stored dataUrl immediately at add time
  if (S.files[id].dataUrl) {
    S.files[id].dataUrl = fixDataUrlMime(S.files[id].dataUrl, name);
  }
  if (type==='audio' && opts.blob) extractThumb(id);
  if (isH(name) && !S.lastHtmlId) S.lastHtmlId = id;
  ensureFolders(path);
  renderAll();
  return id;
}

function deleteFile(id, silent) {
  if (!S.files[id]) return;
  delete S.files[id];
  S.modified.delete(id);
  S.favorites = S.favorites.filter(f=>f!==id);
  const ti = S.openTabs.indexOf(id);
  if (ti!==-1) {
    S.openTabs.splice(ti,1);
    if (S.activeId===id) activate(S.openTabs[Math.max(0,ti-1)] || S.openTabs[0] || null);
  }
  if (S.lastHtmlId===id) S.lastHtmlId = Object.keys(S.files).find(i=>isH(S.files[i].name))||null;
  if (!silent) renderAll();
}

function dupFile(id) {
  const f = S.files[id]; if(!f) return;
  return addFile({name:f.name,path:f.path,content:f.content,dataUrl:f.dataUrl,blob:f.blob,type:f.type});
}

function renameFile(id, newName) {
  const f=S.files[id]; if(!f||!newName.trim()) return;
  f.name = newName.trim();
  const parts = f.path.split('/'); parts[parts.length-1]=f.name; f.path=parts.join('/');
  f.type = ftyp(f.name);
  renderAll(); renderTabBar();
}

function toggleFav(id) {
  const i = S.favorites.indexOf(id);
  if (i!==-1) S.favorites.splice(i,1); else S.favorites.push(id);
  renderAll();
}

// ═══════════════════════════════════════════════════════════
// AUDIO THUMBNAIL (ID3 APIC)
// ═══════════════════════════════════════════════════════════
function extractThumb(id) {
  const f = S.files[id]; if(!f||!f.blob) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const arr = new Uint8Array(ev.target.result);
      if (arr[0]!==0x49||arr[1]!==0x44||arr[2]!==0x33) return;
      const sz = ((arr[6]&0x7f)<<21)|((arr[7]&0x7f)<<14)|((arr[8]&0x7f)<<7)|(arr[9]&0x7f);
      let i=10;
      while(i<sz+10) {
        const fid = String.fromCharCode(arr[i],arr[i+1],arr[i+2],arr[i+3]);
        const fsz = (arr[i+4]<<24)|(arr[i+5]<<16)|(arr[i+6]<<8)|arr[i+7];
        i+=10;
        if (fid==='APIC') {
          let j=i+1; while(j<i+fsz&&arr[j]!==0)j++; j++; j++; while(j<i+fsz&&arr[j]!==0)j++; j++;
          const blob = new Blob([arr.slice(j,i+fsz)]);
          f.thumbUrl = URL.createObjectURL(blob);
          renderAll(); return;
        }
        i+=fsz;
      }
    } catch(e){}
  };
  r.readAsArrayBuffer(f.blob);
}

// TABS
// ═══════════════════════════════════════════════════════════
function openTab(id) {
  if (!id||!S.files[id]) { activate(null); return; }
  if (!S.openTabs.includes(id)) S.openTabs.push(id);
  activate(id);
}

function activate(id) {
  S.activeId = id;
  renderTabBar(); renderEditor(); updatePos(); updateFname();
}

function closeTab(id) {
  const i=S.openTabs.indexOf(id); if(i===-1) return;
  S.openTabs.splice(i,1); S.modified.delete(id);
  if (S.activeId===id) activate(S.openTabs[Math.max(0,i-1)]||S.openTabs[0]||null);
  else renderTabBar();
}

function renderAll() { renderSidebar(); renderTabBar(); updateCounts(); }

function updateCounts() {
  const all = Object.values(S.files);
  document.getElementById('ct-all').textContent  = all.length;
  document.getElementById('ct-text').textContent = all.filter(f=>f.type==='text').length;
  document.getElementById('ct-img').textContent  = all.filter(f=>f.type==='image').length;
  document.getElementById('ct-aud').textContent  = all.filter(f=>f.type==='audio').length;
}

function renderSidebar() {
  const t = S.sidebarTab;
  const list = document.getElementById('file-list');
  const typeFilter = t==='text'?f=>f.type==='text':t==='images'?f=>f.type==='image':t==='audio'?f=>f.type==='audio':null;
  const allFiles = Object.values(S.files);
  const visFiles = typeFilter ? allFiles.filter(typeFilter) : allFiles;

  if (t === 'all') {
    // Tree view with real folders
    list.innerHTML = buildFolderTree();
    attachDragHandlers();
  } else {
    // Flat filtered view (unchanged behaviour for type tabs)
    if (!visFiles.length) {
      list.innerHTML = `<div class="sb-empty">No ${t} files yet.<br>Click <i class="fa fa-plus"></i> or drop files.</div>`;
      return;
    }
    const favSet = new Set(S.favorites);
    const ids = sortedIds(typeFilter);
    const favIds = ids.filter(id=>favSet.has(id));
    const restIds = ids.filter(id=>!favSet.has(id));
    let html = '';
    if (favIds.length) {
      html += `<div class="fl-label"><i class="fa fa-star" style="color:var(--yellow);margin-right:4px"></i>Pinned</div>`;
      favIds.forEach(id=>html+=fiHtml(id,favSet.has(id),0));
    }
    if (restIds.length) {
      if (favIds.length) html += `<div class="fl-label">Files</div>`;
      restIds.forEach(id=>html+=fiHtml(id,favSet.has(id),0));
    }
    list.innerHTML = html;
  }
}

function buildFolderTree() {
  const favSet = new Set(S.favorites);
  let html = '';

  // Get top-level folders and files
  function getTopFolders() {
    return Object.keys(S.folders).filter(p => !p.includes('/')).sort();
  }
  function getChildFolders(parentPath) {
    const pre = parentPath + '/';
    return Object.keys(S.folders).filter(p => p.startsWith(pre) && !p.slice(pre.length).includes('/')).sort();
  }
  function getFilesInFolder(folderPath) {
    return Object.keys(S.files).filter(id => {
      const p = S.files[id].path;
      const dir = p.includes('/') ? p.split('/').slice(0,-1).join('/') : '';
      return dir === folderPath;
    }).sort((a,b) => S.files[a].name.localeCompare(S.files[b].name));
  }

  function renderFolder(folderPath, depth) {
    const fo = S.folders[folderPath];
    if (!fo) return '';
    const collapsed = fo.collapsed;
    const name = folderPath.split('/').pop();
    const indent = depth * 14;
    let fhtml = `<div class="fo" style="padding-left:${6+indent}px" data-folder="${escA(folderPath)}"
      onclick="toggleFolder('${escA(folderPath)}')"
      oncontextmenu="showFolderCtx(event,'${escA(folderPath)}')">
      <span class="fo-arrow${collapsed?'':' open'}">&#9656;</span>
      <span class="fo-ico"><i class="fa fa-folder${collapsed?'':'-open'}" style="color:var(--yellow)"></i></span>
      <span class="fo-nm" title="${escA(folderPath)}">${escH(name)}</span>
      <div class="fo-acts">
        <div class="fia" onclick="event.stopPropagation();openNewFolderModal('${escA(folderPath)}')" title="New subfolder"><i class="fa fa-folder-plus"></i></div>
        <div class="fia" onclick="event.stopPropagation();openNewFileInFolder('${escA(folderPath)}')" title="New file here"><i class="fa fa-plus"></i></div>
        <div class="fia del" onclick="event.stopPropagation();if(confirm('Delete folder and all contents?'))deleteFolder('${escA(folderPath)}')" title="Delete folder"><i class="fa fa-trash"></i></div>
      </div>
    </div>`;
    if (!collapsed) {
      // child folders
      getChildFolders(folderPath).forEach(cp => { fhtml += renderFolder(cp, depth + 1); });
      // files in this folder
      getFilesInFolder(folderPath).forEach(id => { fhtml += fiHtml(id, favSet.has(id), depth + 1); });
    }
    return fhtml;
  }

  // Pinned files (shown at top regardless of folder)
  const pinnedIds = Object.keys(S.files).filter(id => favSet.has(id));
  if (pinnedIds.length) {
    html += `<div class="fl-label"><i class="fa fa-star" style="color:var(--yellow);margin-right:4px"></i>Pinned</div>`;
    pinnedIds.forEach(id => html += fiHtml(id, true, 0));
  }

  // Top-level folders
  getTopFolders().forEach(fp => { html += renderFolder(fp, 0); });

  // Root-level files (not in any folder, not pinned)
  const rootFiles = getFilesInFolder('').filter(id => !favSet.has(id));
  if (rootFiles.length) {
    if (getTopFolders().length || pinnedIds.length) html += `<div class="fl-label">Root files</div>`;
    rootFiles.forEach(id => html += fiHtml(id, false, 0));
  }

  if (!html) html = `<div class="sb-empty">No files yet.<br>Click <i class="fa fa-plus"></i> or drop files.</div>`;
  return html;
}

function toggleFolder(folderPath) {
  if (!S.folders[folderPath]) return;
  S.folders[folderPath].collapsed = !S.folders[folderPath].collapsed;
  renderSidebar();
}

function attachDragHandlers() {
  document.querySelectorAll('.fi[draggable="true"]').forEach(el => {
    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', el.dataset.id);
      e.dataTransfer.effectAllowed = 'move';
    });
  });
  document.querySelectorAll('.fo').forEach(el => {
    el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault(); el.classList.remove('drag-over');
      const id = e.dataTransfer.getData('text/plain');
      if (id) moveFileToFolder(id, el.dataset.folder);
    });
  });
}

function fiHtml(id, fav) {
  const f=S.files[id];
  const active=S.activeId===id;
  const sameNm=Object.values(S.files).filter(x=>x.name===f.name).length;
  const badge=sameNm>1?`<span class="fi-badge">#${id}</span>`:'';
  return `<div class="fi${active?' active':''}${fav?' fav':''}" data-id="${id}"
    onclick="openTab('${id}')" oncontextmenu="showCtx(event,'${id}')">
    <div class="fi-ico">${iconInner(f)}</div>
    <span class="fi-nm" title="${escA(f.path)}">${escH(f.name)}</span>
    ${badge}
    <div class="fi-acts">
      <div class="fia star${fav?' on':''}" onclick="event.stopPropagation();toggleFav('${id}')" title="${fav?'Unpin':'Pin'}"><i class="fa fa-star"></i></div>
      <div class="fia exp" onclick="event.stopPropagation();exportFile('${id}')" title="Export file"><i class="fa fa-download"></i></div>
      <div class="fia del" onclick="event.stopPropagation();deleteFile('${id}')" title="Delete"><i class="fa fa-trash"></i></div>
    </div>
  </div>`;
}

function switchTab(t) {
  S.sidebarTab = t;
  document.querySelectorAll('.stab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));
  renderSidebar();
}

function openNewFileInFolder(folderPath) {
  S.modalMode = 'new';
  S.modalFolder = folderPath;
  document.getElementById('modal-title').textContent = 'New File in ' + folderPath.split('/').pop();
  document.getElementById('modal-inp').value = '';
  document.getElementById('modal-inp').placeholder = 'filename.html';
  document.getElementById('modal-ov').classList.add('on');
  setTimeout(()=>document.getElementById('modal-inp').focus(),50);
}

function renderTabBar() {
  document.getElementById('tabbar').innerHTML=S.openTabs.map(id=>{
    const f=S.files[id]; if(!f) return '';
    const sameNm=Object.values(S.files).filter(x=>x.name===f.name).length;
    const dup=sameNm>1?`<span class="t-dup">#${id}</span>`:'';
    return `<div class="tab${S.activeId===id?' active':''}${S.modified.has(id)?' mod':''}" onclick="activate('${id}')">
      <span class="t-ico">${iconInner(f,true)}</span>
      <span class="t-nm">${escH(f.name)}</span>${dup}
      <span class="t-x" onclick="event.stopPropagation();closeTab('${id}')"><i class="fa fa-xmark"></i></span>
    </div>`;
  }).join('');
  renderSidebar();
}

// EDITOR
// ═══════════════════════════════════════════════════════════
function renderEditor() {
  const id=S.activeId;
  if (!id||!S.files[id]) { showNoFile(); return; }
  const f=S.files[id];
  hide('no-file');
  if (f.type==='image') {
    hide('ed-cont');
    showMediaViewer();
    const iw=document.getElementById('img-wrap');
    const aw=document.getElementById('aud-wrap');
    iw.style.display='flex'; aw.style.display='none';
    stopAudio();
    const imgEl=document.getElementById('img-el');
    imgEl.src=f.dataUrl||'';
    document.getElementById('img-dims').textContent='…';
    syncPreviewIfNeeded();
  } else if (f.type==='audio') {
    hide('ed-cont');
    showMediaViewer();
    document.getElementById('img-wrap').style.display='none';
    document.getElementById('aud-wrap').style.display='flex';
    loadAudio(id,f);
    syncPreviewIfNeeded();
  } else {
    hideMediaViewer();
    stopAudio();
    document.getElementById('ed-cont').style.display='flex';
    document.getElementById('img-wrap').style.display='none';
    document.getElementById('aud-wrap').style.display='none';
    document.getElementById('editor').value=f.content;
    updateLineNums();
    if (isH(f.name)) { S.lastHtmlId=id; if(S.previewOn) updatePreview(); }
    else syncPreviewIfNeeded();
  }
}

function hide(id){const el=document.getElementById(id);if(el)el.style.display='none';}
function show(id,disp='block'){const el=document.getElementById(id);if(el)el.style.display=disp;}
function showMediaViewer(){const mv=document.getElementById('media-viewer');mv.style.display='flex';mv.classList.add('on');}
function hideMediaViewer(){const mv=document.getElementById('media-viewer');mv.style.display='none';mv.classList.remove('on');}
function showNoFile(){hide('ed-cont');hideMediaViewer();document.getElementById('img-wrap').style.display='none';document.getElementById('aud-wrap').style.display='none';show('no-file','flex');}

function syncPreviewIfNeeded() {
  if (S.previewOn && S.lastHtmlId && S.files[S.lastHtmlId]) updatePreview();
}

// ═══════════════════════════════════════════════════════════
// LINE NUMBERS
// ═══════════════════════════════════════════════════════════
function updateLineNums() {
  const ta=document.getElementById('editor');
  const cnt=ta.value.split('\n').length;
  let s='';
  for(let i=1;i<=cnt;i++)s+=i+'\n';
  document.getElementById('line-nums').textContent=s;
}

function syncScroll() {
  document.getElementById('line-nums').scrollTop=document.getElementById('editor').scrollTop;
}

function onEdit() {
  const id=S.activeId; if(!id) return;
  S.files[id].content=document.getElementById('editor').value;
  S.modified.add(id); renderTabBar(); updateLineNums();
  if (S.previewOn && isH(S.files[id].name)) {
    clearTimeout(S._pd); S._pd=setTimeout(updatePreview,400);
  }
}

function onEdKey(e) {
  if (e.key==='Tab') {
    e.preventDefault();
    const ta=e.target,s=ta.selectionStart,en=ta.selectionEnd;
    ta.value=ta.value.substring(0,s)+'  '+ta.value.substring(en);
    ta.selectionStart=ta.selectionEnd=s+2;
    onEdit();
  }
  updatePos();
}

function updatePos() {
  const ta=document.getElementById('editor');
  if (!ta||document.getElementById('ed-cont').style.display==='none') return;
  const v=ta.value.substring(0,ta.selectionStart).split('\n');
  updateFname(`Ln ${v.length} Col ${v[v.length-1].length+1}`);
}

function updateFname(extra) {
  const id=S.activeId;
  const name=id&&S.files[id]?S.files[id].name:'no file open';
  document.getElementById('fname-display').textContent=extra?`${name}  ${extra}`:name;
}

const AEL = document.getElementById('audio-el');

function loadAudio(id, f) {
  document.getElementById('aud-title').textContent=f.name;
  const art=document.getElementById('aud-art');
  art.innerHTML=f.thumbUrl?`<img src="${f.thumbUrl}" alt="">`:`<i class="fa fa-music"></i>`;

  setPlayIco(false); S.audio.playing=false;
  document.getElementById('aud-cur').textContent='0:00';
  document.getElementById('aud-tot').textContent='0:00';
  document.getElementById('aud-prog').value=0; setP(0);
}

function stopAudio(){AEL.pause();AEL.src='';S.audio.playing=false;setPlayIco(false);}
function setPlayIco(p){document.getElementById('play-btn').innerHTML=p?'<i class="fa fa-pause"></i>':'<i class="fa fa-play"></i>';}
function togglePlay(){if(AEL.paused){AEL.play();S.audio.playing=true;setPlayIco(true);}else{AEL.pause();S.audio.playing=false;setPlayIco(false);}}
function seekAudio(v){if(isFinite(AEL.duration))AEL.currentTime=(v/100)*AEL.duration;}
function skipAudio(s){AEL.currentTime=Math.max(0,Math.min(AEL.duration||0,AEL.currentTime+s));}
function setVol(v){AEL.volume=v;document.getElementById('aud-vol-ico').innerHTML=v>0.5?'<i class="fa fa-volume-high"></i>':v>0?'<i class="fa fa-volume-low"></i>':'<i class="fa fa-volume-xmark"></i>';}
function toggleMute(){AEL.muted=!AEL.muted;document.getElementById('aud-vol-ico').innerHTML=AEL.muted?'<i class="fa fa-volume-xmark"></i>':(AEL.volume>0.5?'<i class="fa fa-volume-high"></i>':'<i class="fa fa-volume-low"></i>');}
function fmt(s){if(!isFinite(s))return'0:00';return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;}
function setP(p){document.getElementById('aud-prog').style.setProperty('--p',p+'%');}

AEL.addEventListener('timeupdate',()=>{const p=AEL.duration?(AEL.currentTime/AEL.duration)*100:0;document.getElementById('aud-prog').value=p;setP(p);document.getElementById('aud-cur').textContent=fmt(AEL.currentTime);});
AEL.addEventListener('loadedmetadata',()=>{document.getElementById('aud-tot').textContent=fmt(AEL.duration);});
AEL.addEventListener('ended',()=>{S.audio.playing=false;setPlayIco(false);});

// ═══════════════════════════════════════════════════════════
// FIND ASSET HELPER
// ═══════════════════════════════════════════════════════════
function findAsset(ref) {
  if (!ref) return null;
  const skip = ['data:', 'http://', 'https://', '//', 'blob:', 'about:', 'javascript:'];
  if (skip.some(p => ref.startsWith(p))) return null;
  const clean = ref.replace(/^\.\//, '');
  const byPath = Object.values(S.files).find(f => f.path === clean || f.path === ref);
  if (byPath) return byPath;
  const name = clean.split('/').pop();
  return Object.values(S.files).find(f => f.name === name) || null;
}

// ═══════════════════════════════════════════════════════════
// PREVIEW
// ═══════════════════════════════════════════════════════════
function getPreviewId() {
  let id = null;
  if (S.activeId && S.files[S.activeId] && isH(S.files[S.activeId].name)) id=S.activeId;
  else if (S.lastHtmlId && S.files[S.lastHtmlId]) id=S.lastHtmlId;
  else id = Object.keys(S.files).find(i=>isH(S.files[i].name))||null;
  if (id && S.files[id]) {
    const nm=S.files[id].name;
    const copies=Object.keys(S.files).filter(i=>S.files[i].name===nm&&isH(S.files[i].name));
    if (copies.length>1) { copies.sort((a,b)=>parseInt(a.slice(1))-parseInt(b.slice(1))); id=copies[0]; }
  }
  return id;
}

function togglePreview(){S.previewOn?closePreview():openPreview();}

function openPreview() {
  const id=getPreviewId();
  if (!id){tlog('No HTML file to preview.','warn');showTerm();return;}
  S.previewOn=true; S.lastHtmlId=id;
  document.getElementById('preview-panel').classList.add('on');
  document.getElementById('btn-prev').classList.add('on');
  updatePreview();
}

function closePreview(){S.previewOn=false;document.getElementById('preview-panel').classList.remove('on');document.getElementById('btn-prev').classList.remove('on');}

// ═══════════════════════════════════════════════════════════
// BUILD SELF-CONTAINED HTML — all fixes applied here
// ═══════════════════════════════════════════════════════════
// FIX: Uses index-based placeholder substitution instead of string.replace(full, newFull).
// This prevents: (1) regex special chars in tag strings breaking replace,
// (2) identical tags being double-replaced or skipped,
// (3) already-substituted data URLs being partially re-processed.
async function buildSelfContained(htmlContent) {

  const closeStyle  = '</' + 'style>';
  const closeScript = '</' + 'script>';

  // ── PASS 0 — inject runtime asset-map + src interceptor ──────────────────
  // Collects every image/audio/video file the editor knows about and builds
  // a filename→dataUrl map that is embedded as a <script> at the very top of
  // <head>.  A lightweight proxy installed in the same script intercepts:
  //   • img.src = "foo.gif"          (HTMLImageElement / HTMLVideoElement / etc.)
  //   • el.setAttribute('src', …)
  //   • el.style.backgroundImage = "url('foo.png')"
  //   • new Image() / document.createElement('img')  (via MutationObserver)
  //   • fetch('foo.png') / XHR.open('GET','foo.png')
  // so that any runtime reference to a local filename resolves to its data URL,
  // even when the image is created entirely in JavaScript.

  // Build the map — only media files, skip text.
  const assetMapEntries = [];
  for (const f of Object.values(S.files)) {
    if (f.type === 'text') continue;
    const du = await assetDataUrl(f);
    if (!du) continue;
    // Key by bare filename AND by relative path (both are common in JS)
    const bare = f.name;
    const rel  = f.path.replace(/^\.\//, '');
    // Escape for embedding inside a JS string literal (single-quoted)
    const escapedDu = du.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    if (!assetMapEntries.find(e => e.key === bare))
      assetMapEntries.push({ key: bare, val: escapedDu });
    if (rel !== bare && !assetMapEntries.find(e => e.key === rel))
      assetMapEntries.push({ key: rel,  val: escapedDu });
    // Also key by ./ prefix variant
    const dotSlash = './' + bare;
    if (!assetMapEntries.find(e => e.key === dotSlash))
      assetMapEntries.push({ key: dotSlash, val: escapedDu });
  }

  if (assetMapEntries.length > 0) {
    // Build the injected script — use IIFE so nothing leaks to page globals
    // except window.__ASSET_MAP__ which is intentionally public for debugging.
    const mapLiteral = '{\n' +
      assetMapEntries.map(e => `  '${e.key.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}':'${e.val}'`).join(',\n') +
      '\n}';

    const interceptorScript = `<script>(function(){
var M=window.__ASSET_MAP__=${mapLiteral};
function res(src){
  if(!src||src.startsWith('data:')||src.startsWith('http')||src.startsWith('//')||src.startsWith('blob:'))return src;
  var clean=src.replace(/^\\.\\//, '');
  return M[src]||M[clean]||M[clean.split('/').pop()]||src;
}
/* Intercept src property on img/video/audio/source elements */
var srcDesc=Object.getOwnPropertyDescriptor(HTMLImageElement.prototype,'src')||
            {get:function(){return this.getAttribute('src');},set:function(v){this.setAttribute('src',v);}};
var origSrcSet=srcDesc.set.bind;
function patchSrcProto(proto){
  var orig=Object.getOwnPropertyDescriptor(proto,'src');
  if(!orig)return;
  Object.defineProperty(proto,'src',{
    get:orig.get,
    set:function(v){orig.set.call(this,res(v));},
    configurable:true
  });
}
[HTMLImageElement,HTMLVideoElement,HTMLAudioElement,HTMLSourceElement,HTMLIFrameElement,HTMLEmbedElement].forEach(function(C){
  try{patchSrcProto(C.prototype);}catch(e){}
});
/* Intercept setAttribute */
var origSetAttr=Element.prototype.setAttribute;
Element.prototype.setAttribute=function(name,value){
  if((name==='src'||name==='href')&&typeof value==='string')
    origSetAttr.call(this,name,res(value));
  else
    origSetAttr.call(this,name,value);
};
/* Intercept style.backgroundImage assignments */
try{

function runFile() {
  const id=S.activeId; if(!id){tlog('No file open.','warn');showTerm();return;}
  const f=S.files[id]; if(f.type!=='text'){tlog('Cannot run media files.','warn');showTerm();return;}
  const e=ext(f.name); showTerm(); tlog(`▶ Running: ${f.name}`,'info');
  if (isH(f.name)) runHtml(f.name,f.content);
  else if (['js','jsx','ts','tsx'].includes(e)) runJs(f.name,f.content);
  else if (['css','scss','sass','less'].includes(e)) runCss(f.name,f.content);
  else if (e==='json') runJson(f.name,f.content);
  else tlog(`No runner for .${e}`,'warn');
}

function runHtml(name,content) {
  const voids=new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);
  const stack=[]; const re=/<\/?([a-zA-Z][a-zA-Z0-9-]*)[^>]*>/g; let m;
  while((m=re.exec(content))!==null){const full=m[0],tag=m[1].toLowerCase();if(voids.has(tag))continue;if(full.startsWith('</')){if(stack.length&&stack[stack.length-1]===tag)stack.pop();}else if(!full.endsWith('/>'))stack.push(tag);}
  const sre=/<script(?:[^>]*)>([\s\S]*?)<\/script>/gi; let sm,je=[];
  while((sm=sre.exec(content))!==null)if(sm[1].trim())je=je.concat(lintJs(sm[1],'<script>'));
  const cre=/<style(?:[^>]*)>([\s\S]*?)<\/style>/gi; let csm,ce=[];
  while((csm=cre.exec(content))!==null)ce=ce.concat(lintCss(csm[1]));
  je.forEach(e=>tlog(e,'err')); ce.forEach(e=>tlog(e,'warn'));
  if(stack.length)tlog(`Unclosed tags: ${stack.join(', ')}`,'warn');
  if(!je.length&&!ce.length&&!stack.length)tlog('✔ No errors found.','ok');
}

function runJs(name,code) {
  const e=lintJs(code,name);
  if(e.length){e.forEach(x=>tlog(x,'err'));return;}

function runJson(name,code){try{JSON.parse(code);tlog('✔ Valid JSON.','ok');}catch(e){tlog('JSON: '+e.message,'err');}}

// BASH TERMINAL
// ═══════════════════════════════════════════════════════════
const TERM_HISTORY = [];
let   HIST_IDX     = -1;

function termFocus() {
  const inp = document.getElementById('term-input');
  if (inp) { inp.focus(); updateTermDisplay(); }
}

function updateTermDisplay() {
  const inp = document.getElementById('term-input');
  const disp = document.getElementById('term-display');
  if (!inp || !disp) return;
  disp.textContent = inp.value;
  inp.style.paddingLeft = (document.getElementById('term-prompt').offsetWidth + 12) + 'px';
}

function handleTermKey(e) {
  const inp = document.getElementById('term-input');

  if (e.key === 'Enter') {
    e.preventDefault();
    const cmd = inp.value.trim();
    inp.value = '';
    updateTermDisplay();
    HIST_IDX = -1;
    if (!cmd) return;
    TERM_HISTORY.unshift(cmd);
    if (TERM_HISTORY.length > 100) TERM_HISTORY.pop();
    const o = document.getElementById('term-out');
    const d = document.createElement('div');
    d.className = 'tl cmd';
    d.innerHTML = '<span class="tl-dollar">$</span>' + escH(cmd);
    o.appendChild(d);
    o.scrollTop = o.scrollHeight;
    runCommand(cmd);
    return;
  }

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (HIST_IDX < TERM_HISTORY.length - 1) HIST_IDX++;
    inp.value = TERM_HISTORY[HIST_IDX] || '';
    updateTermDisplay();
    setTimeout(() => inp.setSelectionRange(inp.value.length, inp.value.length), 0);
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (HIST_IDX > 0) HIST_IDX--; else { HIST_IDX = -1; inp.value = ''; updateTermDisplay(); return; }
    inp.value = TERM_HISTORY[HIST_IDX] || '';
    updateTermDisplay();
    return;
  }

  if (e.key === 'Tab') {
    e.preventDefault();
    const parts = inp.value.split(' ');
    const partial = parts[parts.length - 1];
    if (!partial) return;
    const mf = Object.values(S.files).find(f => f.name.startsWith(partial));
    const mdir = Object.keys(S.folders).map(p=>p.split('/').pop()).find(n=>n.startsWith(partial));
    const match = mf ? mf.name : mdir ? mdir+'/' : null;
    if (match) { parts[parts.length - 1] = match; inp.value = parts.join(' '); updateTermDisplay(); }
    return;
  }

  setTimeout(updateTermDisplay, 0);
}

function runCommand(input) {
  if (!input) return;
  const tokens = input.match(/(?:[^\s"]+|"[^"]*")+/g) || [];
  const cmd    = (tokens[0] || '').toLowerCase();
  const args   = tokens.slice(1).map(t => t.replace(/^"|"$/g, ''));

  try {
    switch (cmd) {
      case 'help':    return cmd_help();
      case 'ls':      return cmd_ls(args);
      case 'pwd':     return tlog((S.cwd ? '/' + S.cwd : '/'), 'ok');
      case 'echo':    return tlog(args.join(' ') || '', '');
      case 'history': return cmd_history();
      case 'stat':    return cmd_stat();
      case 'tabs':    return cmd_tabs();
      case 'clear':   return clearTerm();
      case 'touch':    return cmd_touch(args);
      case 'new':      return cmd_new(args);
      case 'rm':       return cmd_rm(args);
      case 'mv':       return cmd_mv(args);
      case 'cp':       return cmd_cp(args);
      case 'cat':      return cmd_cat(args);
      case 'head':     return cmd_head(args);
      case 'tail':     return cmd_tail(args);
      case 'wc':       return cmd_wc(args);
      case 'grep':     return cmd_grep(args);
      case 'open':     return cmd_open(args);
      case 'write':    return cmd_write(args);
      case 'truncate': return cmd_truncate(args);
      case 'mkdir':    return cmd_mkdir(args);
      case 'rmdir':    return cmd_rmdir(args);
      case 'cd':       return cmd_cd(args);
      case 'lsdir':    return cmd_lsdir(args);
      case 'run':      return runFile();
      case 'preview':  return togglePreview();
      case 'notes':    return toggleNotes();
      case 'close':    return cmd_close();
      case 'export':   return exportZip();
      case 'exportfile': return exportActiveFile();
      default:
        tlog(`Unknown command: "${cmd}" — type "help" for list`, 'warn');
    }
  } catch (e) {
    tlog('Error: ' + e.message, 'err');
  }
}

function cmd_ls(args) {
  const long = args.includes('-l');
  const cwd = S.cwd;
  const pre = cwd ? cwd + '/' : '';

  // folders in cwd
  const childFolders = Object.keys(S.folders).filter(p => {
    if (!cwd) return !p.includes('/');
    return p.startsWith(pre) && !p.slice(pre.length).includes('/');
  }).sort();

  // files in cwd
  const childFiles = Object.keys(S.files).filter(id => {
    const p = S.files[id].path;
    const dir = p.includes('/') ? p.split('/').slice(0,-1).join('/') : '';
    return dir === cwd;
  }).sort((a,b)=>S.files[a].name.localeCompare(S.files[b].name));

  if (!childFolders.length && !childFiles.length) { tlog('(empty)', ''); return; }

  childFolders.forEach(fp => tlog((long ? 'dir        ' : '') + fp.split('/').pop() + '/', ''));
  childFiles.forEach(id => {
    const f = S.files[id];
    if (long) {
      const sz = f.type === 'text'
        ? (new Blob([f.content]).size + ' B').padStart(8)
        : (f.blob ? (f.blob.size + ' B').padStart(8) : '     — ');
      tlog(`${f.type.padEnd(6)}  ${sz}  ${f.name}`, '');
    } else {
      tlog(f.name, '');
    }
  });
}

  if (S.folders[dstPath]) { moveFileToFolder(id, dstPath); return; }

  const lines = f.content.split('\n').length;
  const words = f.content.trim() ? f.content.trim().split(/\s+/).length : 0;
  const chars = f.content.length;
  tlog(`  ${lines} lines  ${words} words  ${chars} chars  ${name}`, '');
}

function cmd_grep(args) {
  const [pattern, name] = args;
  if (!pattern || !name) { tlog('grep: usage: grep <pattern> <file>', 'warn'); return; }
  const id = findFileByName(name);
  if (!id) { tlog(`grep: "${name}" not found`, 'warn'); return; }
  const f = S.files[id];
  if (f.type !== 'text') { tlog('grep: not a text file', 'warn'); return; }
  let re;
  try { re = new RegExp(pattern, 'i'); } catch(e) { tlog('grep: invalid regex: ' + e.message, 'err'); return; }
  const hits = f.content.split('\n').map((line, i) => ({ line, i: i + 1 })).filter(x => re.test(x.line));
  if (!hits.length) { tlog('(no matches)', ''); return; }
  hits.forEach(h => tlog(`${String(h.i).padStart(4)}: ${h.line}`, ''));
}

function cmd_open(args) {
  const name = args[0];
  if (!name) { tlog('open: missing filename', 'warn'); return; }
  const id = findFileByName(name);
  if (!id) { tlog(`open: "${name}" not found`, 'warn'); return; }
  openTab(id);
  tlog(`Opened: ${name}`, 'ok');
}

function cmd_write(args) {
  const name = args[0];
  const text = args.slice(1).join(' ');
  if (!name) { tlog('write: usage: write <file> <text>', 'warn'); return; }
  const id = findFileByName(name);
  if (!id) { tlog(`write: "${name}" not found`, 'warn'); return; }
  const f = S.files[id];
  if (f.type !== 'text') { tlog('write: not a text file', 'warn'); return; }
  f.content += (f.content ? '\n' : '') + text;
  S.modified.add(id);
  renderTabBar();
  if (S.activeId === id) document.getElementById('editor').value = f.content;
  updateLineNums();
  tlog(`Appended to ${name}`, 'ok');
}

function cmd_truncate(args) {
  const name = args[0];
  if (!name) { tlog('truncate: missing filename', 'warn'); return; }
  const id = findFileByName(name);
  if (!id) { tlog(`truncate: "${name}" not found`, 'warn'); return; }
  const f = S.files[id];
  if (f.type !== 'text') { tlog('truncate: not a text file', 'warn'); return; }
  f.content = '';
  S.modified.add(id);
  if (S.activeId === id) { document.getElementById('editor').value = ''; updateLineNums(); }
  renderTabBar();
  tlog(`Cleared: ${name}`, 'ok');
}

function cmd_mkdir(args) {
  const name = args[0];
  if (!name) { tlog('mkdir: missing name', 'warn'); return; }
  const fp = S.cwd ? S.cwd + '/' + name : name;
  if (S.folders[fp]) { tlog('mkdir: ' + fp + ' already exists', 'warn'); return; }
  addFolder(fp);
}

function cmd_rmdir(args) {
  const name = args[0];
  if (!name) { tlog('rmdir: missing name', 'warn'); return; }
  const fp = resolvePath(name);
  if (!S.folders[fp]) { tlog('rmdir: "' + fp + '" not found', 'warn'); return; }
  if (confirm('Delete folder "' + fp + '" and all its contents?')) deleteFolder(fp);
}

function cmd_cd(args) {
  const target = args[0] || '';
  if (target === '' || target === '/' || target === '~') {
    S.cwd = ''; tlog('/ (root)', 'ok'); updateTermPrompt(); return;
  }
  if (target === '..') {
    const parts = S.cwd.split('/'); parts.pop();
    S.cwd = parts.join('/'); tlog(S.cwd || '/', 'ok'); updateTermPrompt(); return;
  }
  const fp = resolvePath(target);
  if (!S.folders[fp]) { tlog('cd: "' + fp + '" not found', 'warn'); return; }
  S.cwd = fp; tlog(fp, 'ok'); updateTermPrompt();
}

function resolvePath(p) {
  if (!p) return S.cwd;
  if (p.startsWith('/')) return p.replace(/^\//, '');
  if (!S.cwd) return p;
  return S.cwd + '/' + p;
}

function updateTermPrompt() {
  const el = document.getElementById('term-prompt');
  if (el) el.textContent = (S.cwd ? S.cwd : '/') + ' $ ';
  updateTermDisplay();
}

function cmd_lsdir(args) {
  // ls -d: list folders only
  const folders = Object.keys(S.folders).sort();
  if (!folders.length) { tlog('(no folders)', ''); return; }
  folders.forEach(fp => tlog(fp + '/', ''));
}

function cmd_close() {
  if (!S.activeId) { tlog('close: no active tab', 'warn'); return; }
  const name = S.files[S.activeId] ? S.files[S.activeId].name : '?';
  closeTab(S.activeId);
  tlog(`Closed: ${name}`, 'ok');
}

function findFileByName(name) {
  // try path match first (relative to cwd)
  const resolved = resolvePath(name);
  const byPath = Object.keys(S.files).find(id => S.files[id].path === resolved || S.files[id].path === name);
  if (byPath) return byPath;
  // bare name match
  const exact = Object.keys(S.files).find(id => S.files[id].name === name);
  if (exact) return exact;
  const lower = name.toLowerCase();
  return Object.keys(S.files).find(id => S.files[id].name.toLowerCase() === lower) || null;
}

// ═══════════════════════════════════════════════════════════
// IMPORT / EXPORT ZIP
// FIX: Pass filename to b2du so it can set correct MIME
// ═══════════════════════════════════════════════════════════
function importZip(){document.getElementById('zip-input').click();}

async function handleZipImport(e) {
  const file=e.target.files[0]; if(!file) return; e.target.value='';
  tlog(`Importing ${file.name}...`,'info'); showTerm();
  try {
    const zip=await JSZip.loadAsync(file);
    const tasks=[];
    zip.forEach((relPath,entry)=>{
      if(entry.dir)return;
      const clean=relPath.replace(/^\//,'');
      const nm=clean.split('/').pop(); if(!nm)return;
      tasks.push((async()=>{
        if(isI(nm)){
          // FIX: pass nm to b2du so MIME is set correctly for ALL image types including gif
          const blob=await entry.async('blob');
          const du=await b2du(blob, nm);
          addFile({name:nm,path:clean,content:'',dataUrl:du,blob,type:'image'});
        }
        else if(isA(nm)){
          const blob=await entry.async('blob');
          const du=await b2du(blob, nm);
          addFile({name:nm,path:clean,content:'',dataUrl:du,blob,type:'audio'});
        }
        else{const c=await entry.async('string');addFile({name:nm,path:clean,content:c,type:'text'});}
      })());
    });
    await Promise.all(tasks);
    tlog(`✔ Imported ${tasks.length} files from ${file.name}`,'ok');
    renderAll();
  } catch(err){tlog('ZIP error: '+err.message,'err');}
}

async function exportZip() {
  const ids=Object.keys(S.files);
  if(!ids.length){tlog('No files to export.','warn');showTerm();return;}
  tlog('Building ZIP...','info'); showTerm();
  const zip=new JSZip();
  for(const id of ids){
    const f=S.files[id];
    if(f.type==='text') zip.file(f.path,f.content);
    else if(f.blob) zip.file(f.path,f.blob);
    else if(f.dataUrl) zip.file(f.path,du2b(f.dataUrl));
  }
  const blob=await zip.generateAsync({type:'blob'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='project.zip'; a.click();
  URL.revokeObjectURL(url);
  tlog(`Successfully exported ${ids.length} files!`,'ok');
}

// ═══════════════════════════════════════════════════════════
// EXPORT INDIVIDUAL FILE
// ═══════════════════════════════════════════════════════════
function exportFile(id) {
  const f = S.files[id]; if (!f) return;
  let blob;
  if (f.type === 'text') {
    blob = new Blob([f.content], { type: 'text/plain;charset=utf-8' });
  } else if (f.blob) {
    blob = f.blob;
  } else if (f.dataUrl) {
    blob = du2b(f.dataUrl);
  } else {
    tlog('Export: nothing to save for ' + f.name, 'warn'); showTerm(); return;
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = f.name; a.click();
  URL.revokeObjectURL(url);
  tlog('Exported: ' + f.name, 'ok');
}

function exportActiveFile() {
  if (!S.activeId) { tlog('No file selected.', 'warn'); showTerm(); return; }
  exportFile(S.activeId);
}

function du2b(du) {
  const [h,d]=du.split(',');
  const mime=h.match(/:(.*?);/)[1];
  const bin=atob(d);
  const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

// ═══════════════════════════════════════════════════════════
// FILE UPLOAD
// ═══════════════════════════════════════════════════════════
function triggerUpload(){document.getElementById('file-input').click();}
function handleUpload(e){Array.from(e.target.files).forEach(f=>loadFileObj(f));e.target.value='';}

function loadFileObj(file, overridePath) {
  const nm=file.name, path=overridePath||nm;
  if(isI(nm)||isA(nm)){
    const r=new FileReader();
    r.onload=ev=>{
      // FIX: fix MIME on the dataUrl immediately after reading
      const rawDu = ev.target.result;
      const fixedDu = fixDataUrlMime(rawDu, nm);
      const id=addFile({name:nm,path,content:'',dataUrl:fixedDu,blob:file,type:isI(nm)?'image':'audio'});
      openTab(id);
    };
    r.readAsDataURL(file);
  }
  else{const r=new FileReader();r.onload=ev=>{const id=addFile({name:nm,path,content:ev.target.result,type:'text'});openTab(id);};r.readAsText(file);}
}

function openAddFileModal(){S.modalMode='new';S.ctxId=null;S.modalFolder=S.cwd||null;document.getElementById('modal-title').textContent='New File';document.getElementById('modal-inp').value='';document.getElementById('modal-inp').placeholder='filename.html';document.getElementById('modal-ov').classList.add('on');setTimeout(()=>document.getElementById('modal-inp').focus(),50);}
function openRenameModal(id){S.modalMode='rename';S.ctxId=id;document.getElementById('modal-title').textContent='Rename';document.getElementById('modal-inp').value=S.files[id].name;document.getElementById('modal-ov').classList.add('on');setTimeout(()=>{const i=document.getElementById('modal-inp');i.focus();i.select();},50);}
function closeModal(e){if(!e||e.target===document.getElementById('modal-ov'))document.getElementById('modal-ov').classList.remove('on');}
function modalOK(){
  const v=document.getElementById('modal-inp').value.trim(); if(!v) return;
  document.getElementById('modal-ov').classList.remove('on');
  if(S.modalMode==='rename'&&S.ctxId){renameFile(S.ctxId,v);}
  else if(S.modalMode==='renamefolder'&&S.ctxFolder){renameFolder(S.ctxFolder,v);S.ctxFolder=null;}
  else if(S.modalMode==='newfolder'){
    const fp = S.modalFolder ? S.modalFolder+'/'+v : v;
    addFolder(fp); S.modalFolder=null;
  }
  else{
    const path = S.modalFolder ? S.modalFolder+'/'+v : v;
    const id=addFile({name:v,path,content:'',type:'text'});
    openTab(id);
    S.modalFolder=null;
    if(isH(v)&&!S.previewOn){const hs=Object.keys(S.files).filter(i=>isH(S.files[i].name));if(hs.length===1)openPreview();}
  }
}

let dc=0;
document.addEventListener('dragenter',e=>{e.preventDefault();dc++;document.getElementById('drop-ov').classList.add('on');});
document.addEventListener('dragleave',()=>{dc--;if(dc<=0){dc=0;document.getElementById('drop-ov').classList.remove('on');}});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();dc=0;document.getElementById('drop-ov').classList.remove('on');Array.from(e.dataTransfer.files).forEach(f=>loadFileObj(f));});

// ═══════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  const m=e.ctrlKey||e.metaKey;
  if(m&&e.key==='p'){e.preventDefault();togglePreview();}
  if(m&&e.key==='`'){e.preventDefault();toggleTerminal();}
  if(m&&e.key==='n'){e.preventDefault();openAddFileModal();}
  if(m&&e.key==='o'){e.preventDefault();triggerUpload();}
  if(m&&e.key==='Enter'){e.preventDefault();runFile();}
  if(m&&e.key==='d'){e.preventDefault();if(S.activeId)dupFile(S.activeId);}
  if(m&&e.key==='k'){e.preventDefault();toggleNotes();}
  if(e.key==='Escape'){document.getElementById('modal-ov').classList.remove('on');document.getElementById('ctx').classList.remove('on');document.getElementById('ctx-fo').classList.remove('on');closeMoveModal();}
});

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escA(s){return String(s).replace(/'/g,"&#39;");}
